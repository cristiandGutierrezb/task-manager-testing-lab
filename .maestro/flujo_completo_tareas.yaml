appId: com.taskmanager.app
---
# 1. Abrir la app y verificar la pantalla principal
- launchApp
- assertVisible: "Nueva tarea"

# 2. Intentar guardar vacío no muestra confirmación
- tapOn: "Guardar"
- assertNotVisible: "Tarea creada exitosamente"

# 3. Llenar el formulario y guardar
- tapOn:
    id: "input-titulo"
- inputText: "Comprar materiales para el proyecto"
- tapOn: "Guardar"

# 4. Verificar confirmación de creación
- assertVisible: "Tarea creada exitosamente"
